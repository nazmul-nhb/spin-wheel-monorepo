<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Spin Wheel — Embed Demo</title>
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			body {
				font-family: system-ui, -apple-system, sans-serif;
				background: #f0f2f5; color: #333;
				min-height: 100vh; display: flex; flex-direction: column;
				align-items: center; padding: 2rem 1rem;
			}
			h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
			p.subtitle { margin-bottom: 2rem; color: #666; }
			section { margin-bottom: 2.5rem; width: 100%; max-width: 820px; }
			section h2 { font-size: 1.25rem; margin-bottom: 0.75rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.25rem; }
			.card {
				background: #fff; border-radius: 12px;
				box-shadow: 0 2px 12px rgba(0,0,0,.08);
				padding: 1.5rem; display: flex; flex-direction: column;
				align-items: center; gap: 1rem;
			}
			#manual-wheel, .auto-wheel { width: 320px; height: 320px; }
			#manual-result, .event-log { margin-top: .5rem; font-weight: 600; min-height: 1.5em; }
			.event-log { font-size: .85rem; color: #555; max-height: 120px; overflow-y: auto; width: 100%; }
			button.demo-btn {
				padding: .5rem 1.4rem; font-size: 1rem; font-weight: 600;
				border: none; border-radius: 6px; background: #4f46e5;
				color: #fff; cursor: pointer; transition: background .15s;
			}
			button.demo-btn:hover:not(:disabled) { background: #4338ca; }
			button.demo-btn:disabled { opacity: .55; cursor: not-allowed; }
		</style>
	</head>
	<body>
		<h1>🎡 Spin Wheel — Embed Demo</h1>
		<p class="subtitle">Demonstrates the global <code>&lt;script&gt;</code> build of <code>@spin-wheel/embed</code></p>

		<!-- ============================================================ -->
		<!-- SECTION 1: Manual Init -->
		<!-- ============================================================ -->
		<section>
			<h2>1 · Manual Init (<code>SpinWheel.create()</code>)</h2>
			<div class="card">
				<div id="manual-wheel"></div>
				<button class="demo-btn" id="manual-btn" type="button">Spin!</button>
				<div id="manual-result"></div>
			</div>
		</section>

		<!-- ============================================================ -->
		<!-- SECTION 2: Auto Init (data attributes) -->
		<!-- ============================================================ -->
		<section>
			<h2>2 · Auto Init (<code>data-spin-wheel</code>)</h2>
			<div class="card">
				<div
					class="auto-wheel"
					data-spin-wheel
					data-renderer="svg"
					data-duration="3500"
					data-min-spins="4"
					data-max-spins="7"
					data-seed="embed-demo"
					data-spin-button="true"
					data-spin-button-text="Try your luck"
					data-segments='[
						{"id":"10","label":"10 %","weight":3},
						{"id":"20","label":"20 %","weight":2},
						{"id":"30","label":"30 %","weight":1},
						{"id":"free","label":"Free spin","weight":4},
						{"id":"50","label":"50 %","weight":1},
						{"id":"miss","label":"Try again","weight":5}
					]'
				></div>
				<div class="event-log" id="auto-log"></div>
			</div>
		</section>

		<!-- ============================================================ -->
		<!-- SECTION 3: Event Listeners -->
		<!-- ============================================================ -->
		<section>
			<h2>3 · Custom DOM Events</h2>
			<p style="margin-bottom:.5rem;color:#666;font-size:.9rem;">
				Events are logged below when the auto-init wheel above fires
				<code>spinwheel:ready</code>, <code>spinwheel:state</code>,
				and <code>spinwheel:finish</code>.
			</p>
			<div class="event-log" id="event-log" style="max-height:200px;background:#f8fafc;border-radius:8px;padding:.75rem;font-family:monospace;font-size:.8rem;"></div>
		</section>

		<!-- Load the global bundle -->
		<script src="./spin-wheel.global.js"></script>
		<script>
			// ---- Manual init ----
			const wheel = SpinWheel.create('#manual-wheel', {
				renderer: 'canvas',
				durationMs: 4000,
				seed: 'manual-demo',
				segments: [
					{ id: '1', label: '🍕 Pizza' },
					{ id: '2', label: '🍔 Burger' },
					{ id: '3', label: '🌮 Tacos' },
					{ id: '4', label: '🍣 Sushi' },
					{ id: '5', label: '🥗 Salad' },
					{ id: '6', label: '🍜 Ramen' },
				],
			});

			const btn = document.getElementById('manual-btn');
			const resultEl = document.getElementById('manual-result');
			btn.addEventListener('click', () => {
				btn.disabled = true;
				resultEl.textContent = 'Spinning…';
				wheel.spin().then((result) => {
					resultEl.textContent = 'Winner: ' + result.segment.label;
					btn.disabled = false;
				});
			});

			// ---- Auto init ----
			SpinWheel.autoInit();

			// ---- DOM event listeners ----
			const log = document.getElementById('event-log');
			function logEvent(e) {
				const line = document.createElement('div');
				line.textContent =
					new Date().toLocaleTimeString() +
					' — ' + e.type +
					': ' + JSON.stringify(e.detail);
				log.prepend(line);
			}
			document.addEventListener('spinwheel:ready', logEvent);
			document.addEventListener('spinwheel:state', logEvent);
			document.addEventListener('spinwheel:finish', logEvent);
		</script>
	</body>
</html>
